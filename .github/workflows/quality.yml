name: Quality Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate cask syntax
        run: |
          ruby -c Casks/*.rb

  merge-gate:
    name: merge-gate
    if: always()
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - name: Enforce upstream success
        run: |
          test "${{ needs.quality.result }}" = "success"
